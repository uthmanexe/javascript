<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <script>
      let computerChoice;
      function gamePick(choice) {
        const randomNumber = Math.random();
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerChoice = "rock";
        } else if (randomNumber > 1 / 3 && randomNumber < 2 / 3) {
          computerChoice = "paper";
        } else if (randomNumber > 2 / 3 && randomNumber < 1) {
          computerChoice = "scissors";
        }

        if (computerChoice === choice) {
          console.log(computerChoice);
          console.log(
            `computer: ${computerChoice}, user: ${choice}.It's a draw`,
          );
        } else {
          console.log(computerChoice);
          console.log("Just checking some shii");
        }
      }
    </script>
  </head>

  <body class="buttons">
    <p id="name">Rock Paper Scissors</p>
    <div>
      <button onclick="gamePick('rock')">Rock</button>

      <button onclick="gamePick('paper')">Paper</button>

      <button onclick="gamePick('scissors')">Scissors</button>
    </div>
  </body>
</html>
