<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="/css/calculator.css">
</head>

<body>
    <h1>Calculator</h1>
    <div class="Calc">
        <div class="screen-container">
            <input type="number" class="calc-screen" placeholder="0">
        </div>
        <div class="row1">
            <br>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>x</button>
        </div>
        <div class="row2">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
        </div>
        <div class="row3">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>
        </div>
        <div class="row3">
            <button style="width: 8em;">0</button>
            <button>/</button>
            <button>=</button>
        </div>
    </div>
</body>

</html>
